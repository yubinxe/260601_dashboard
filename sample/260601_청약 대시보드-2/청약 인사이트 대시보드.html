<style>
  /* interaction polish that needs real selectors */
  .rowhover { transition: background .2s var(--ease); }
  .rowhover:hover { background: var(--surface-2); }
  .hero-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lift); }

  @media (max-width: 1080px) {
    .hero-grid, .score-grid { grid-template-columns: 1fr 1fr !important; }
    .hero-grid > :nth-child(3) { display: none; }
    .comp-grid, .win-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) {
    .hero-grid, .score-grid { grid-template-columns: 1fr !important; }
    main { padding: 28px 18px 64px !important; }
    header > div { padding: 0 18px !important; }
  }
</style>
